defaults:
  - default_dataset.yaml
  - _self_

exp_name: finetune_small_city
img_size: 518
num_workers: 8
seed_value: 42
accum_steps: 2
patch_size: 14
val_epoch_freq: 5
max_img_per_gpu: 48

limit_train_batches: 800
limit_val_batches: 400

data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      repeat_batch: False
      training: True
      inside_random: True
      load_depth: True
      img_nums: [2, 24]
      allow_duplicate_img: True
      get_nearby: True
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.small_city.SmallCityDataset
          split: train
          DATASET_DIR: /mnt/sfs_turbo_new/R10844/zhangpeilun/vggt/data/small_city/train  # 修改为实际 small_city 目录的绝对路径
          json_name: "transforms_train_vggt.json"
          min_num_images: 2
          len_train: 10000
          image_ext: ".png"
          depth_ext: ".exr"
          depth_scale: 0.001    # 若深度图单位不是米，请在这里调整
          max_depth: 200.0
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      training: False
      inside_random: True
      load_depth: True
      img_nums: [2, 12]
      allow_duplicate_img: True
      get_nearby: True
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.small_city.SmallCityDataset
          split: test
          DATASET_DIR: /mnt/sfs_turbo_new/R10844/zhangpeilun/vggt/data/small_city/test  # 修改为实际 small_city 目录的绝对路径
          json_name: "transforms_test_vggt.json"
          min_num_images: 2
          len_test: 1000
          image_ext: ".png"
          depth_ext: ".exr"
          depth_scale: 0.001
          max_depth: 100.0

logging:
  log_dir: logs/${exp_name}
  log_visuals: False
  log_freq: 10
  log_level_primary: INFO
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_reg_depth
        - loss_grad_depth
        - loss_conf_depth
        - loss_camera
    val:
      keys_to_log:
        - loss_objective
        - loss_reg_depth
        - loss_grad_depth
        - loss_conf_depth
        - loss_camera

checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 5
  resume_checkpoint_path: /mnt/sfs_turbo_new/R10844/zhangpeilun/vggt/checkpoints/model.pt   # 修改为预训练 VGGT 权重
  strict: False

loss:
  _target_: loss.MultitaskLoss
  camera:
    weight: 1.0
    loss_type: "l1"
    gamma: 0.6
    pose_encoding_type: "absT_quaR_FoV"
    weight_trans: 1.0
    weight_rot: 1.0
    weight_focal: 0.5
  depth:
    weight: 1.0
    gradient_loss_fn: "grad"
    valid_range: 0.98
  point: null
  track: null

optim:
  param_group_modifiers: False

  optimizer:
    _target_: torch.optim.AdamW
    lr: 1e-5
    weight_decay: 0.05

  # 冻结部分模块：这里只冻结 point/track 相关，保留 camera/depth 可训练
  frozen_module_names:
    - "*aggregator*" 

  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["depth", "camera"]
        max_norm: 1.0
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 1e-5
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 1e-5
              end_value: 1e-8
          lengths: [0.1, 0.9]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05

max_epochs: 20

model:
  _target_: vggt.models.vggt.VGGT
  enable_camera: True
  enable_depth: True
  enable_point: False
  enable_track: False

distributed:
  backend: nccl
  comms_dtype: None
  find_unused_parameters: True
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True


